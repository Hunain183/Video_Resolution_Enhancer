version: '3.8'

# Development compose file with GPU support

services:
  backend:
    build:
      context: ../server
      dockerfile: ../docker/Dockerfile.backend
    container_name: ai-video-enhancer-backend-dev
    volumes:
      - ../server:/app
      - ../models:/app/models
      - ../temp:/app/temp
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # Enable GPU support for docker compose (non-swarm)
    gpus: all
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - dev-network

  frontend:
    image: node:20-alpine
    container_name: ai-video-enhancer-frontend-dev
    working_dir: /app
    volumes:
      - ../client:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge
